<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイマー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #08081a;
      color: #fff;
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    #phase-name {
      font-size: clamp(1.2rem, 3vw, 2rem);
      color: rgba(255,255,255,0.45);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: clamp(16px, 3vh, 36px);
      min-height: 1.4em;
      text-align: center;
      padding: 0 20px;
    }

    #time {
      font-size: clamp(5rem, 18vw, 15rem);
      font-weight: 700;
      font-family: 'Courier New', 'Consolas', monospace;
      letter-spacing: 0.05em;
      line-height: 1;
      transition: color 0.4s;
      color: #fff;
      text-shadow: 0 0 60px rgba(255,255,255,0.12);
    }
    #time.running  { color: #3ecf8e; text-shadow: 0 0 80px rgba(62,207,142,0.25); }
    #time.paused   { color: #f5a623; text-shadow: 0 0 80px rgba(245,166,35,0.25); }
    #time.finished { color: #e05252; text-shadow: 0 0 80px rgba(224,82,82,0.4); animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.2; } }

    .progress-wrap {
      width: clamp(260px, 55vw, 640px);
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      margin-top: clamp(24px, 4vh, 48px);
      overflow: hidden;
    }
    #progress {
      height: 100%;
      border-radius: 3px;
      background: #3ecf8e;
      transition: width 1s linear, background 0.4s;
      width: 100%;
    }

    #status {
      margin-top: 20px;
      font-size: clamp(0.75rem, 1.5vw, 1rem);
      color: rgba(255,255,255,0.25);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* subtle gradient bg animation */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 100%, rgba(62,207,142,0.04) 0%, transparent 60%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="phase-name">—</div>
  <div id="time">00:00</div>
  <div class="progress-wrap">
    <div id="progress"></div>
  </div>
  <div id="status">待機中</div>

  <script>
    const timeEl    = document.getElementById('time');
    const phaseEl   = document.getElementById('phase-name');
    const progressEl = document.getElementById('progress');
    const statusEl  = document.getElementById('status');

    const STATUS = { running: '進行中', paused: '一時停止', stopped: '停止中' };
    const COLOR  = { running: '#3ecf8e', paused: '#f5a623', stopped: '#e05252' };

    function update({ rem, total, state, phase }) {
      const m = Math.floor(rem / 60), s = rem % 60;
      timeEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

      phaseEl.textContent = phase || '—';

      const cls = state === 'running' ? 'running'
                : state === 'paused'  ? 'paused'
                : (rem === 0 && total > 0) ? 'finished' : '';
      timeEl.className = cls;

      const pct = total > 0 ? (rem / total) * 100 : 100;
      progressEl.style.width = pct + '%';
      progressEl.style.background = COLOR[state] || '#fff';

      statusEl.textContent = STATUS[state] || '待機中';
    }

    // BroadcastChannel (primary)
    try {
      const bc = new BroadcastChannel('gm-timer');
      bc.onmessage = e => { if (e.data?.type === 'update') update(e.data); };
    } catch(e) {}
  </script>
</body>
</html>
